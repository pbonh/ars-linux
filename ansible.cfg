[defaults]
roles_path = roles
gather_subset = !all,min
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
callbacks_enabled = profile_tasks
forks = 1
timeout = 60

[privilege_escalation]
become_method = sudo
# Non-interactive: rely on sudo's credential cache. Run `sudo -v` before
# `ansible-pull` (or use `just sync`, which does it for you). Avoids ansible's
# prompt-detection timeout on slow first-sudo-on-cold-box scenarios.
become_flags = -n

[ssh_connection]
pipelining = True
