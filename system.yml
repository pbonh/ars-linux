---
- name: Gather facts and load host-specific vars (unprivileged)
  hosts: localhost
  connection: local
  become: false
  gather_facts: true
  vars_files:
    - group_vars/all.yml
  tasks:
    - name: Detect host-specific vars file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/host_vars/{{ ansible_hostname }}.yml"
      register: ars_host_vars_file

    - name: Load host-specific vars
      ansible.builtin.include_vars:
        file: "{{ ars_host_vars_file.stat.path }}"
        name: ars_host_vars
      when: ars_host_vars_file.stat.exists

    - name: Persist host-specific vars across plays
      ansible.builtin.set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ ars_host_vars | default({}) | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

- name: Apply ars-linux system layer
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  vars_files:
    - group_vars/all.yml
  pre_tasks:
    # The retired `containers_policy` role used to drop these files.
    # They cause a duplicate-namespace error in /etc/containers/registries.d/
    # because upstream Zirconium now ships its own (zirconium-dev.yaml).
    # These cleanup tasks remove the orphans; idempotent once the host is clean.
    - name: Remove orphaned ars-linux registries.d entry
      ansible.builtin.file:
        path: /etc/containers/registries.d/zirconium.yaml
        state: absent
      tags: [legacy_cleanup, always]

    - name: Remove orphaned ars-linux cosign key
      ansible.builtin.file:
        path: /etc/pki/containers/zirconium.pub
        state: absent
      tags: [legacy_cleanup, always]

    - name: Check whether upstream ships a factory policy.json
      ansible.builtin.stat:
        path: /usr/etc/containers/policy.json
      register: ars_upstream_policy_json
      tags: [legacy_cleanup, always]

    - name: Restore /etc/containers/policy.json from upstream factory copy
      ansible.builtin.copy:
        remote_src: true
        src: /usr/etc/containers/policy.json
        dest: /etc/containers/policy.json
        owner: root
        group: root
        mode: "0644"
      when: ars_upstream_policy_json.stat.exists
      tags: [legacy_cleanup, always]
  roles:
    - role: rpm_packages
      tags: [rpm_packages]
    - role: dnf_repos
      tags: [dnf_repos]
    - role: third_party_rpms
      tags: [third_party_rpms]
    - role: appimages
      tags: [appimages]
    - role: fonts
      tags: [fonts]
    - role: bootc_image
      tags: [bootc_image]
    - role: profile_d
      tags: [profile_d]
    - role: flatpaks
      tags: [flatpaks]
    - role: systemd_user
      tags: [systemd_user]
    - role: services
      tags: [services]
