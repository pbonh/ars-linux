---
- name: Apply ars-linux system layer
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - group_vars/all.yml
  roles:
    - role: rpm_packages
      tags: [rpm_packages]
    - role: dnf_repos
      tags: [dnf_repos]
    - role: containers_policy
      tags: [containers_policy]
    - role: profile_d
      tags: [profile_d]
    - role: flatpaks
      tags: [flatpaks]
