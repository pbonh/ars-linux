---
- name: Apply ars-linux system layer
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars_files:
    - group_vars/all.yml
  pre_tasks:
    - name: Detect host-specific vars file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/host_vars/{{ ansible_hostname }}.yml"
      register: ars_host_vars_file

    - name: Load host-specific vars
      ansible.builtin.include_vars: "{{ ars_host_vars_file.stat.path }}"
      when: ars_host_vars_file.stat.exists
  roles:
    - role: rpm_packages
      tags: [rpm_packages]
    - role: dnf_repos
      tags: [dnf_repos]
    - role: containers_policy
      tags: [containers_policy]
    - role: third_party_rpms
      tags: [third_party_rpms]
    - role: appimages
      tags: [appimages]
    - role: fonts
      tags: [fonts]
    - role: bootc_image
      tags: [bootc_image]
    - role: profile_d
      tags: [profile_d]
    - role: flatpaks
      tags: [flatpaks]
    - role: systemd_user
      tags: [systemd_user]
    - role: services
      tags: [services]
