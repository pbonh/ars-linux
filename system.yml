---
- name: Apply ars-linux system layer
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - group_vars/all.yml
  roles:
    - role: rpm_packages
      tags: [rpm_packages]
    - role: dnf_repos
      tags: [dnf_repos]
    - role: containers_policy
      tags: [containers_policy]
    - role: third_party_rpms
      tags: [third_party_rpms]
    - role: appimages
      tags: [appimages]
    - role: fonts
      tags: [fonts]
    - role: bootc_image
      tags: [bootc_image]
    - role: profile_d
      tags: [profile_d]
    - role: flatpaks
      tags: [flatpaks]
    - role: systemd_user
      tags: [systemd_user]
    - role: services
      tags: [services]
