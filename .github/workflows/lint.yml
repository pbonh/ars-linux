name: lint
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: yamllint
        run: yamllint .
      - name: ansible-lint
        run: ansible-lint roles/ system.yml user.yml
      - name: pytest
        run: pytest
