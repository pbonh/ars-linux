---
# `state: enabled` (no `state: started`) — these unit files only exist in the
# derived bootc image. Before the first `bootc switch` + reboot, the booted
# upstream Zirconium image doesn't ship them, so trying to start them fails
# unit-not-found. Enabling them suffices: bootc starts them on next boot.
- name: Enable system services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop: "{{ ars_services_enabled }}"
  failed_when: false
