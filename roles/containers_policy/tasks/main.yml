---
- name: Ensure containers/registries.d/ exists
  ansible.builtin.file:
    path: "{{ ars_containers_registries_d_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure /etc/pki/containers exists
  ansible.builtin.file:
    path: "{{ ars_containers_pki_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install policy.json
  ansible.builtin.copy:
    src: policy.json
    dest: "{{ ars_containers_policy_dest }}"
    owner: root
    group: root
    mode: "0644"

- name: Install registries.d entries
  ansible.builtin.copy:
    src: "registries.d/"
    dest: "{{ ars_containers_registries_d_dir }}/"
    owner: root
    group: root
    mode: "0644"

- name: Install cosign public keys
  ansible.builtin.copy:
    src: "pki/"
    dest: "{{ ars_containers_pki_dir }}/"
    owner: root
    group: root
    mode: "0644"
