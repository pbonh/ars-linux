---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Containerfile was rendered
      ansible.builtin.stat:
        path: /var/lib/ars-linux/build/Containerfile
      register: cf_stat
      failed_when: not cf_stat.stat.exists

    - name: Fingerprint was persisted
      ansible.builtin.stat:
        path: /var/lib/ars-linux/last-build.fingerprint
      register: fp_stat
      failed_when: not fp_stat.stat.exists

    - name: Containerfile mentions the base image
      ansible.builtin.command: grep -F "FROM ghcr.io/zirconium-dev/zirconium:latest" /var/lib/ars-linux/build/Containerfile
      changed_when: false
