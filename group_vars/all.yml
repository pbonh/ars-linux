---
ars_user: phillip

# Base / derived image
ars_base_image: ghcr.io/zirconium-dev/zirconium:latest
ars_local_image_tag: localhost/ars-linux:latest
ars_previous_image_tag: localhost/ars-linux:previous

# Build context on the host
ars_build_dir: /var/lib/ars-linux/build
ars_state_dir: /var/lib/ars-linux

# zdots
ars_zdots_repo: https://github.com/pbonh/zdots.git
ars_zdots_branch: main
ars_zdots_install_path: /usr/share/zirconium/zdots

# Per-host package extras (defaulted; overridden in host_vars)
ars_rpm_packages_extra: []
ars_extra_fonts: []

# Codex / npm globals baked into the image
ars_npm_globals:
  - {name: "openai-codex", version: "latest"}

# chezmoi update cadence
ars_chezmoi_update_interval: 24h

# profile.d toggles (all on by default)
ars_profile_d:
  atuin: true
  blesh: true
  brew: true
  carapace: true
  fzf: true
  mise: true
  starship: true
  zoxide: true

# Flatpak preinstalls (matches existing fork)
ars_flatpak_preinstalls:
  - com.bitwarden.desktop
  - io.github.DenysMb.Kontainer
  - io.github.dvlv.boxbuddyrs
  - org.collaboraoffice.LibreOffice
  - com.jeffser.Alpaca
  - md.obsidian.Obsidian
  - org.kde.cantor
  - org.kde.kalgebra
  - io.github.Qalculate
  - org.gnome.Ptyxis
  - io.github.GnomeMpv.Plasmatube
  - com.github.zocker_160.SyncThingy

# Systemd user units enabled by preset (full unit names with suffix)
ars_systemd_user_units:
  - chezmoi-init.service
  - chezmoi-update.timer
  - tailscale-systray.service
